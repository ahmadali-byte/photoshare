<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoShare — Discover</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <span class="logo-icon">◼</span>
    <span>PhotoShare</span>
  </div>
  <div style="flex:1; max-width:380px; margin:0 20px;">
    <div class="search-bar">
      <input type="text" id="search-input" class="form-control"
             placeholder="Search photos, places, creators..."
             onkeydown="if(event.key==='Enter') doSearch()" />
      <button class="btn btn-primary btn-sm" onclick="doSearch()">Search</button>
    </div>
  </div>
  <div class="navbar-actions">
    <span class="badge-role">Consumer</span>
    <span id="nav-username" style="font-size:0.85rem; font-weight:600; color:#888;"></span>
    <button class="btn btn-secondary btn-sm" onclick="logout()">Sign Out</button>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h2 id="feed-heading">Discover Photos</h2>
    <div style="display:flex; gap:8px;">
      <button class="btn btn-ghost btn-sm" onclick="clearSearch()">All Photos</button>
      <button class="btn btn-ghost btn-sm" onclick="loadFeed()">↻ Refresh</button>
    </div>
  </div>
  <div id="photo-grid" class="photo-grid">
    <div class="loading-state"><div class="big-spinner"></div><p>Loading photos...</p></div>
  </div>
  <div id="load-more" style="text-align:center; padding:20px 0; display:none;">
    <button class="btn btn-ghost" onclick="loadMore()">Load More</button>
  </div>
</div>

<!-- Photo Detail Modal -->
<div class="modal-overlay" id="detail-modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="modal-body">
      <img id="modal-photo" class="modal-photo" alt="" />

      <div class="photo-detail-meta" id="modal-meta"></div>

      <div id="modal-ai-box" style="display:none" class="ai-box">
        <div class="ai-title">Azure Computer Vision — AI Analysis</div>
        <p id="modal-ai-desc"></p>
        <div class="tags" id="modal-ai-tags"></div>
      </div>

      <div id="modal-people" class="tags" style="margin-top:8px;"></div>
      <p id="modal-caption" style="margin-top:12px; font-size:0.9rem; line-height:1.6; color:var(--muted);"></p>

      <!-- Rating -->
      <div class="rating-box">
        <h4>Rate this photo</h4>
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          <div class="stars" id="rating-stars"></div>
          <span id="rating-display" class="star-display"></span>
        </div>
        <p id="rating-msg" style="font-size:0.78rem; margin-top:6px; color:var(--muted2);"></p>
      </div>

      <!-- Comments -->
      <div class="comments-section">
        <h4 id="comments-heading">Comments</h4>
        <div id="comments-list"></div>
        <div class="add-comment-form">
          <div class="form-group" style="margin-bottom:8px;">
            <textarea id="comment-input" class="form-control"
              placeholder="Write a comment... (sentiment analysed by Azure AI Language)"
              rows="2"></textarea>
          </div>
          <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
            <button class="btn btn-primary btn-sm" id="comment-btn" onclick="submitComment()">
              <span id="comment-btn-text">Post Comment</span>
            </button>
            <span style="font-size:0.75rem; color:var(--muted2);">
              Sentiment analysis powered by Azure Text Analytics
            </span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/consumer.js"></script>
</body>
</html>
