<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoShare — Sign In</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <div class="auth-logo">📷</div>
        <h1>PhotoShare</h1>
        <p>Cloud-native photo platform · COM769</p>
      </div>
      <div class="auth-body">
        <div class="auth-tabs">
          <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</div>
          <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</div>
          <div class="auth-tab" id="tab-creator" onclick="switchTab('creator')">Creator</div>
        </div>

        <div id="alert-area"></div>

        <!-- ── Login ── -->
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" class="form-control" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" class="form-control" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">
            <span id="login-btn-text">Sign In</span>
          </button>
        </form>

        <!-- ── Register (Consumer) ── -->
        <form id="register-form" style="display:none">
          <div class="form-group">
            <label for="reg-username">Username</label>
            <input type="text" id="reg-username" class="form-control" placeholder="coolphotographer" required />
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" class="form-control" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" class="form-control" placeholder="Min 6 characters" required />
          </div>
          <div class="alert alert-info">
            Consumer accounts can browse, rate, and comment on photos.
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">
            <span id="reg-btn-text">Create Consumer Account</span>
          </button>
        </form>

        <!-- ── Creator Registration (admin-authorised) ── -->
        <form id="creator-form" style="display:none">
          <div class="form-group">
            <label for="cr-username">Username</label>
            <input type="text" id="cr-username" class="form-control" placeholder="photographer_name" required />
          </div>
          <div class="form-group">
            <label for="cr-email">Email</label>
            <input type="email" id="cr-email" class="form-control" placeholder="creator@example.com" required />
          </div>
          <div class="form-group">
            <label for="cr-password">Password</label>
            <input type="password" id="cr-password" class="form-control" placeholder="Min 6 characters" required />
          </div>
          <div class="form-group">
            <label for="cr-secret">Admin Authorisation Key</label>
            <input type="password" id="cr-secret" class="form-control" placeholder="Provided by administrator" required />
          </div>
          <div class="alert alert-info">
            Creator accounts can upload photos. Requires admin key.
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%">
            <span id="cr-btn-text">Create Creator Account</span>
          </button>
        </form>

        <p style="text-align:center; margin-top:20px; font-size:0.75rem; color:#444;">
          Azure Functions · Cosmos DB · Blob Storage · AI Services
        </p>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (Auth.isLoggedIn()) {
      window.location.href = Auth.getRole() === "creator" ? "creator.html" : "consumer.html";
    }

    function switchTab(tab) {
      ["login","register","creator"].forEach(t => {
        document.getElementById("tab-"+t).classList.toggle("active", t === tab);
        const f = document.getElementById(t+"-form");
        if (f) f.style.display = t === tab ? "block" : "none";
      });
      document.getElementById("alert-area").innerHTML = "";
    }

    function showAlert(msg, type = "danger") {
      document.getElementById("alert-area").innerHTML =
        `<div class="alert alert-${type}">${msg}</div>`;
    }

    // Sign In
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("login-btn-text");
      btn.innerHTML = '<span class="spinner"></span>';
      const { ok, data } = await Auth.api("auth/login", {
        method: "POST",
        body: JSON.stringify({
          email: document.getElementById("login-email").value.trim(),
          password: document.getElementById("login-password").value,
        }),
      });
      btn.textContent = "Sign In";
      if (ok) {
        Auth.setSession(data.token, data.user);
        window.location.href = data.user.role === "creator" ? "creator.html" : "consumer.html";
      } else {
        showAlert(data.error || "Login failed. Check your credentials.");
      }
    });

    // Consumer Register
    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("reg-btn-text");
      btn.innerHTML = '<span class="spinner"></span>';
      const { ok, data } = await Auth.api("auth/register", {
        method: "POST",
        body: JSON.stringify({
          username: document.getElementById("reg-username").value.trim(),
          email: document.getElementById("reg-email").value.trim(),
          password: document.getElementById("reg-password").value,
          role: "consumer",
        }),
      });
      btn.textContent = "Create Consumer Account";
      if (ok) {
        Auth.setSession(data.token, data.user);
        window.location.href = "consumer.html";
      } else {
        showAlert(data.error || "Registration failed.");
      }
    });

    // Creator Register (needs admin key)
    document.getElementById("creator-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("cr-btn-text");
      btn.innerHTML = '<span class="spinner"></span>';
      const { ok, data } = await Auth.api("auth/create-creator", {
        method: "POST",
        headers: { "X-Admin-Secret": document.getElementById("cr-secret").value },
        body: JSON.stringify({
          username: document.getElementById("cr-username").value.trim(),
          email: document.getElementById("cr-email").value.trim(),
          password: document.getElementById("cr-password").value,
        }),
      });
      btn.textContent = "Create Creator Account";
      if (ok) {
        showAlert("Creator account created! You can now sign in.", "success");
        setTimeout(() => switchTab("login"), 1500);
      } else {
        showAlert(data.error || "Failed — check your admin key.");
      }
    });
  </script>
</body>
</html>
